<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stopwatch-box">
        <div class="time" id="display">00:00:00</div>

        <div class="buttons">
            <button class="start-btn" id="startBtn">START</button>
            <button class="pause-btn" id="pauseBtn">PAUSE</button>
            <button class="reset-btn" id="resetBtn">RESET</button>
            <button class="lap-btn" id="lapBtn" disabled>LAP</button>
        </div>

        <div class="lap-section">
            <div class="lap-title">LAP TIMES</div>
            <div class="lap-list" id="lapList">
                <ul id="lapListUl">
                    <li class="empty-message">No laps yet.</li>
                </ul>
            </div>
            <button class="clear-btn" id="clearBtn">CLEAR ALL LAPS</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
